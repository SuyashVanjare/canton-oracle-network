name: Canton Oracle Network CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  daml-build-test:
    name: Daml Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.1.0
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build oracle contracts
        run: daml build

      - name: Run oracle aggregation tests
        run: daml test --color

  publisher-lint:
    name: Publisher SDK Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install httpx ruff
      - name: Lint publisher
        run: ruff check publisher/
